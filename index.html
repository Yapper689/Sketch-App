<!DOCTYPE html>
<html lang="en" class="">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <!-- These tags tell mobile browsers to hide the UI if added to the Home Screen -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>Whiteboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { darkMode: 'class' }
    </script>
    <style>
      * { margin: 0; padding: 0; }
      html, body { 
        width: 100%; 
        height: 100%; 
        overflow: hidden; 
        overscroll-behavior: none; 
      }
    </style>
  </head>
  <body class="touch-none">
    <svg id="freehand-canvas" class="absolute inset-0 w-full h-full touch-none z-0 dark:bg-black"></svg>
    
    <div id="wrapper" class="bg-white w-[80px] md:w-[100px] rounded-2xl absolute left-2 top-2 md:left-5 md:top-5 drop-shadow-lg flex flex-col dark:bg-slate-800 transition-all ease-in-out duration-100 z-10">
      
      <div id="header" class="py-3 px-2 border-b border-gray-300 flex justify-center items-center cursor-move dark:border-slate-500">
        <div id="btn-minimize" class="cursor-pointer p-2 -m-2">
          <i id="minimize-icon" class="fa-solid fa-minus text-lg md:text-xl text-purple-700"></i>
        </div>
      </div>
      
      <div id="body" class="flex flex-col items-center justify-center flex-grow space-y-4 py-4">
        
        <div class="flex flex-col md:flex-row space-y-2 md:space-y-0 md:space-x-2 items-center">
            <div id="btn-draw" class="cursor-pointer bg-purple-200 dark:bg-slate-600 p-2 rounded-lg transition-colors">
                <i class="fa-solid fa-pen text-base md:text-lg text-purple-700 dark:text-purple-400"></i>
            </div>
            <div id="btn-erase" class="cursor-pointer hover:bg-gray-100 dark:hover:bg-slate-700 p-2 rounded-lg transition-colors">
                <i class="fa-solid fa-eraser text-base md:text-lg text-purple-700 dark:text-purple-400"></i>
            </div>
        </div>

        <div class="w-full border-t border-gray-200 dark:border-slate-600"></div>

        <div class="cursor-pointer">
          <input id="color-input" type="color" class="rounded-full border-2 border-white h-6 w-6 md:h-7 md:w-7 block disabled:pointer-events-none drop-shadow-md dark:bg-slate-700 dark:border-slate-500" value="#000000">
        </div>

        <div class="cursor-pointer flex flex-col md:flex-row items-center justify-center space-y-2 md:space-y-0 md:space-x-2 h-auto md:h-8">
            <div class="size-btn rounded-full bg-slate-400 w-2 h-2 transition-all" data-size="8"></div>
            <div class="size-btn rounded-full bg-purple-700 w-4 h-4 ring-2 ring-offset-2 ring-purple-300 dark:ring-slate-500 transition-all" data-size="16"></div>
            <div class="size-btn rounded-full bg-slate-400 w-5 h-5 md:w-6 md:h-6 transition-all" data-size="24"></div>
        </div>

        <div class="w-full border-t border-gray-200 dark:border-slate-600"></div>

        <div class="flex flex-col space-y-4 items-center">
            <!-- Added Fullscreen button -->
            <div id="btn-fullscreen" class="cursor-pointer">
                <i id="fullscreen-icon" class="fa-solid fa-expand text-lg md:text-xl text-purple-700"></i>
            </div>
            <div id="btn-save" class="cursor-pointer">
                <i class="fa-regular fa-floppy-disk text-lg md:text-xl text-purple-700"></i>
            </div>
            <div id="btn-clear" class="cursor-pointer">
                <i class="fa-regular fa-trash-can text-lg md:text-xl text-purple-700"></i>
            </div>
            <div id="btn-online" class="cursor-pointer">
                <i id="online-icon" class="fa-solid fa-handshake-slash text-lg md:text-xl text-purple-700"></i>
            </div>
            <div id="btn-dark" class="cursor-pointer">
                <i id="dark-icon" class="fa-regular fa-sun text-lg md:text-xl text-purple-700"></i>
            </div>
        </div>
      </div>
    </div>

    <div id="user-count" class="absolute top-2 right-2 md:top-5 md:right-5 bg-white min-w-[80px] md:min-w-[100px] h-8 md:h-10 px-3 md:px-4 flex items-center justify-center font-sans text-sm md:text-base text-purple-700 rounded-md shadow-md dark:bg-slate-700 z-10">Users: 0</div>
    
    <script type="module" src="./panel.js"></script>
    <script type="module" src="./draw.js"></script>
  </body>
</html>
